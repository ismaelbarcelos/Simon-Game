<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="utf-8">
  <title>Simon</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css?family=Press+Start+2P" rel="stylesheet">
</head>

<body class="d-flex justify-content-center align-items-center vh-100">

  <div class="container text-center">

    <div class="row">
      <div class="col-12">

        <h1 id="level-title">Simon Game</h1>

        <button onclick="comecar()" class="btn btn-primary mb-3">
          Iniciar jogo
        </button>

        <!-- PRIMEIRA LINHA -->
        <div class="row justify-content-center">
          <div id="green" class="col-3 btn green m-2"></div>
          <div id="red" class="col-3 btn red m-2"></div>
        </div>

        <!-- VALORES -->
        <div id="valores" class="d-flex justify-content-center align-items-center gap-2 my-3">
          <h1 id="sequencia">0</h1>
          <h1>-</h1>
          <h1 id="seqjogador">0</h1>
        </div>

        <!-- SEGUNDA LINHA -->
        <div class="row justify-content-center">
          <div id="yellow" class="col-3 btn yellow m-2"></div>
          <div id="blue" class="col-3 btn blue m-2"></div>
        </div>

        <button onclick="resetar()" class="btn btn-danger mt-3">
          Resetar
        </button>

        <h1 id="vez"></h1>
        <h1 id="recorde"></h1>

      </div>
    </div>

  </div>


  <script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"></script>

<script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
</body>

</html>
